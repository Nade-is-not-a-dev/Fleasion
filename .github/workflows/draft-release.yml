name: Build Draft Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONHASHSEED: '0'
  SOURCE_DATE_EPOCH: '0'
  LC_ALL: C.UTF-8
  TZ: UTC

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v7

      - name: Read version
        id: version
        run: |
          app_version="$(sed -n "s/^version = ['\"]\([^'\"]*\)['\"]$/\1/p" pyproject.toml)"
          if [ -z "$app_version" ]; then
            echo "Could not read project.version from pyproject.toml." >&2
            exit 1
          fi
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: Fleasion-v${{ needs.prepare.outputs.app_version }}-Windows.exe
            artifact_path: dist/Fleasion-v*-Windows.exe
          - name: Linux
            os: ubuntu-latest
            artifact_name: Fleasion-v${{ needs.prepare.outputs.app_version }}-Linux
            artifact_path: dist/Fleasion-v*-Linux
          - name: macOS
            os: macos-latest
            artifact_name: Fleasion-v${{ needs.prepare.outputs.app_version }}-MacOS-Universal.zip
            artifact_path: dist/Fleasion-v*-MacOS-Universal.zip

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --locked --group dev

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0 libportaudio2 libpipewire-0.3-0 libspa-0.2-modules libpulse0

      - name: Install UPX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install upx -y --no-progress
          upx --version

      - name: Build Windows package
        if: runner.os == 'Windows'
        run: uv run pyinstaller --clean --noconfirm Fleasion.spec

      - name: Build Linux package
        if: runner.os == 'Linux'
        run: uv run pyinstaller --clean --noconfirm Fleasion.spec

      - name: Prepare Linux executable
        if: runner.os == 'Linux'
        run: |
          linux_binary="$(find dist -maxdepth 1 -type f -name 'Fleasion-v*-Linux' -print -quit)"
          if [ -z "$linux_binary" ]; then
            echo "Could not find Linux executable in dist/." >&2
            exit 1
          fi
          file "$linux_binary" | grep -q 'ELF'
          chmod 755 "$linux_binary"
          test -x "$linux_binary"

      - name: Verify Linux audio runtime
        if: runner.os == 'Linux'
        run: |
          archive_listing="$(uv run pyi-archive_viewer -b -l dist/Fleasion-v*-Linux)"
          printf '%s\n' "$archive_listing" | grep -Ei 'portaudio|pulse|pipewire|jack|alsa|sound' || true
          if [[ "$archive_listing" =~ lib(portaudio|asound|jack|pulse|pulsecommon-|pipewire-) ]]; then
            echo "Linux package must use host audio backend libraries, not the GitHub runner copies." >&2
            exit 1
          fi

      - name: Install Rosetta
        if: runner.os == 'macOS'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Build macOS package
        if: runner.os == 'macOS'
        run: ./scripts/build_macos.sh

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          archive: false
          if-no-files-found: error

  draft-release:
    name: Create draft release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: Fleasion-v${{ needs.prepare.outputs.app_version }}-*
          path: release-files
          merge-multiple: true
          skip-decompress: true

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.app_version }}
          target_commitish: ${{ github.sha }}
          name: Fleasion v${{ needs.prepare.outputs.app_version }}
          draft: true
          generate_release_notes: true
          files: release-files/*
          fail_on_unmatched_files: true
